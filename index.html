<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crime</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="mouse-glow" id="glow"></div>

<div class="container">
  <div class="card">

    <div class="profile">
      <img src="avatar.png" class="avatar">
      <div class="status-dot"></div>
    </div>

    <h1>Crime</h1>
    <p class="tag">Crime#8439</p>

    <div class="status-row">
      <span class="dot"></span>
      <span class="text">Online</span>
    </div>

    <div class="details">
      <p>Ping: 23ms</p>
      <p>Uptime: 2h 14m</p>
    </div>

  </div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="music-control" onclick="toggleMusic()">♪</div>

<script src="script.js"></script>
</body>
</html>
